name: Mobile CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo version sync
        run: npm run check:mobile-version

      - name: Run unit tests
        run: npm test

      - name: Verify Android version sync
        run: npm run check:android-version
